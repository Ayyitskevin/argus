<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>argus / photometa — {{ title or 'Phase 0' }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 2rem; background: #f8f7f4; color: #222; line-height: 1.4; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1rem; }
    .photo { border: 1px solid #e8e4da; border-radius: 6px; overflow: hidden; background: #fff; }
    .photo-header { padding: .5rem .75rem; background: #fafafa; font-size: .9rem; border-bottom: 1px solid #eee; }
    .meta { padding: .75rem; font-size: .9rem; }
    .tag { display: inline-block; background: #f0ede6; padding: 1px 6px; margin: 1px 3px 1px 0; border-radius: 3px; font-size: .75rem; }
    .score { font-weight: 600; color: #1a5f3a; }
    form { margin: 1rem 0; }
    input[type=text], input[type=file], input[type=number] { padding: .5rem; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #222; color: white; border: none; border-radius: 4px; padding: .5rem .9rem; cursor: pointer; font-size: 1rem; }
    button:hover { background: #444; }
    .small { font-size: .8rem; color: #666; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    pre { background: #f9f8f4; padding: .5rem; overflow: auto; font-size: .75rem; }
    .nav { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 style="margin:0">argus <span class="small">/ photometa</span></h1>
      <div class="small">
        {{ model }} · <a href="/healthz">/healthz</a> · <a href="/">home</a>
      </div>
    </div>
    {% block content %}{% endblock %}
    <p class="small" style="margin-top:2rem">Phase 0 — local only · <a href="https://github.com/Ayyitskevin/argus" target="_blank">GitHub</a></p>
  </div>
</body>
</html>
