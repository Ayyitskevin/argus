{% extends "base.html" %}

{% block content %}
<div class="card card-warn">
  <h2 style="margin-top:0">{{ title or 'Error' }}</h2>
  <p>{{ message }}</p>
  {% if status_code %}
  <p class="small">HTTP {{ status_code }}</p>
  {% endif %}
  <p class="nav" style="margin-top:1rem"><a href="/">← home</a></p>
</div>
{% endblock %}
